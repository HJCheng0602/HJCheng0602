name: Render AI workbench

on:
  push:
    paths: [data/devices/**, scripts/merge-snapshots.mjs, scripts/render-dashboard.mjs, scripts/render-profile-header.mjs, scripts/render-focus.mjs, scripts/render-selected-work.mjs]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Merge device snapshots
        run: node scripts/merge-snapshots.mjs
      - run: npm run render
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: render AI workbench"
