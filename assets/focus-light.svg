<svg xmlns="http://www.w3.org/2000/svg" width="840" height="340" viewBox="0 0 840 340" role="img" aria-label="JinCheng Han technical focus across GPU kernels, AI systems, and MLSys research">
  <style>
    text{font-family:ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace;text-rendering:geometricPrecision}
    .sans{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif}
    .title{font-size:20px;font-weight:800;letter-spacing:.6px;fill:#1F2328}
    .eyebrow{font-size:8.5px;font-weight:600;letter-spacing:2.2px;fill:#818B98}
    .section{font-size:12.5px;font-weight:700;letter-spacing:.4px;fill:#1F2328}
    .sectionMeta{font-size:7.5px;font-weight:600;letter-spacing:1.5px;fill:#818B98}
    .chipText{font-size:7.5px;font-weight:600;letter-spacing:1px;fill:#1F2328}
    .nodeLabel{font-size:9px;font-weight:700;letter-spacing:.5px;fill:#1F2328}
    .nodeDetail{font-size:7.5px;font-weight:600;letter-spacing:.8px;fill:#59636E}
    .footText{font-size:8px;font-weight:600;letter-spacing:2px;fill:#818B98}
    .panel{fill:#FFFFFF;fill-opacity:.82;stroke:#D1D9E0;stroke-width:1}
    .chipPanel{fill:#F6F8FA;stroke:#D1D9E0;stroke-width:1}
    .topEdge{stroke:#B6C2CF;stroke-width:1;stroke-opacity:.55}
    .edgeFlow{animation:edgeRun 7.5s linear infinite}
    .grid{stroke:#D1D9E0;stroke-width:1}
    .intro,.panelIn{animation:fadeUp 560ms cubic-bezier(.22,1,.36,1) both}
    .ripple{transform-box:fill-box;transform-origin:center;opacity:0;animation:ripple 3.6s cubic-bezier(.25,.6,.35,1) infinite}
    .drawLine{stroke-dasharray:420;animation:drawIn 1.1s cubic-bezier(.4,0,.2,1) .5s both}
    .areaFade{animation:fadeIn 700ms ease-out 1.1s both}
    .glowDot{transform-box:fill-box;transform-origin:center;animation:livePulse 2.6s ease-in-out infinite}
    @keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes drawIn{from{stroke-dashoffset:420}to{stroke-dashoffset:0}}
    @keyframes ripple{0%{opacity:0;transform:scale(.5)}18%{opacity:.55}72%{opacity:0;transform:scale(1.5)}100%{opacity:0;transform:scale(1.5)}}
    @keyframes livePulse{0%,100%{opacity:.5}50%{opacity:1}}
    @keyframes edgeRun{to{stroke-dashoffset:0}}
    @media(prefers-reduced-motion:reduce){*{animation:none!important}}
  </style>

  <defs>
    <linearGradient id="stepFill" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#0969DA" stop-opacity=".32"/><stop offset="1" stop-color="#0969DA" stop-opacity="0"/></linearGradient>
    <linearGradient id="tlGrad" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#087EA4"/><stop offset="1" stop-color="#8250DF"/></linearGradient>
    <linearGradient id="footGrad" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#0969DA"/><stop offset=".55" stop-color="#087EA4"/><stop offset="1" stop-color="#8250DF"/></linearGradient>
    <radialGradient id="dotGlow" cx=".5" cy=".5" r=".5"><stop stop-color="#087EA4" stop-opacity=".5"/><stop offset="1" stop-color="#087EA4" stop-opacity="0"/></radialGradient>
  </defs>

  <g class="intro">
    <text x="28" y="28" class="eyebrow">GPU KERNELS · AI SYSTEMS · MLSYS RESEARCH</text>
    <text x="28" y="52" class="title sans">TECHNICAL FOCUS</text>
    <text x="812" y="28" text-anchor="end" class="eyebrow">BUILD · PROFILE · VALIDATE</text>
    <rect x="29" y="60" width="58" height="3" rx="1.5" fill="url(#footGrad)"/>
  </g>

  <g class="panelIn" style="animation-delay:.24s">
    <rect x="28" y="74" width="250" height="220" rx="14" class="panel"/><rect x="29" y="75" width="248" height="218" rx="13" fill="none" stroke="#087EA4" stroke-width="3" stroke-opacity=".15" pathLength="100" stroke-dasharray="14 86" stroke-dashoffset="100" class="edgeFlow" style="animation-delay:0s"/><rect x="29" y="75" width="248" height="218" rx="13" fill="none" stroke="#087EA4" stroke-width="1.1" stroke-opacity=".8" pathLength="100" stroke-dasharray="14 86" stroke-dashoffset="100" class="edgeFlow" style="animation-delay:0s"/><line x1="42" y1="75" x2="264" y2="75" class="topEdge"/><rect x="46" y="91" width="6" height="6" rx="1.5" fill="#0969DA"/><text x="60" y="98" class="section sans">KERNEL ENGINEERING</text><text x="46" y="116" class="sectionMeta">CUDA C++ TO PTX / SASS</text><line x1="46" y1="130" x2="260" y2="130" class="grid"/>
    <g class="areaFade"><path d="M46 226V206H99V188H152V170H205V152H258V226Z" fill="url(#stepFill)"/></g>
    <path d="M46 226V206H99V188H152V170H205V152H258" fill="none" stroke="#0969DA" stroke-width="2" stroke-linejoin="round" class="drawLine"/>
    <circle cx="258" cy="152" r="7" fill="url(#dotGlow)" class="glowDot"/><circle cx="258" cy="152" r="2.6" fill="#087EA4" class="glowDot"/>
    <text x="46" y="242" class="sectionMeta">TILE · LOAD · SCHEDULE · EXECUTE</text>
    <g><rect x="46" y="252" width="56" height="22" rx="6" class="chipPanel"/><polygon points="0,-3.4 3.4,0 0,3.4 -3.4,0" transform="translate(57 263)" fill="#0969DA"/><text x="66" y="267" class="chipText">GEMM</text></g><g><rect x="110" y="252" width="92" height="22" rx="6" class="chipPanel"/><polygon points="0,-3.4 3.4,0 0,3.4 -3.4,0" transform="translate(121 263)" fill="#087EA4"/><text x="130" y="267" class="chipText">FLASHATTN</text></g><g><rect x="210" y="252" width="50" height="22" rx="6" class="chipPanel"/><polygon points="0,-3.4 3.4,0 0,3.4 -3.4,0" transform="translate(221 263)" fill="#8250DF"/><text x="230" y="267" class="chipText">TOPK</text></g>
  </g>

  <g class="panelIn" style="animation-delay:.38s">
    <rect x="295" y="74" width="250" height="220" rx="14" class="panel"/><rect x="296" y="75" width="248" height="218" rx="13" fill="none" stroke="#087EA4" stroke-width="3" stroke-opacity=".15" pathLength="100" stroke-dasharray="14 86" stroke-dashoffset="100" class="edgeFlow" style="animation-delay:2.4s"/><rect x="296" y="75" width="248" height="218" rx="13" fill="none" stroke="#087EA4" stroke-width="1.1" stroke-opacity=".8" pathLength="100" stroke-dasharray="14 86" stroke-dashoffset="100" class="edgeFlow" style="animation-delay:2.4s"/><line x1="309" y1="75" x2="531" y2="75" class="topEdge"/><rect x="313" y="91" width="6" height="6" rx="1.5" fill="#087EA4"/><text x="327" y="98" class="section sans">GPU ARCHITECTURE</text><text x="313" y="116" class="sectionMeta">HOPPER / BLACKWELL</text><line x1="313" y1="130" x2="527" y2="130" class="grid"/>
    <line x1="327" y1="152" x2="327" y2="238" stroke="url(#tlGrad)" stroke-width="2" stroke-linecap="round" stroke-opacity=".65"/>
    <g><circle cx="327" cy="154" r="8" fill="none" stroke="#0969DA" stroke-width="1" class="ripple" style="animation-delay:0.4s"/><circle cx="327" cy="154" r="8" fill="none" stroke="#0969DA" stroke-width="1" class="ripple" style="animation-delay:2.2s"/><circle cx="327" cy="154" r="3.2" fill="#0969DA"/><text x="341" y="153" class="nodeLabel">MEMORY PATH</text><text x="341" y="165" class="nodeDetail">TMA · DSM · TMEM</text></g>
    <g><circle cx="327" cy="196" r="8" fill="none" stroke="#087EA4" stroke-width="1" class="ripple" style="animation-delay:1.1s"/><circle cx="327" cy="196" r="8" fill="none" stroke="#087EA4" stroke-width="1" class="ripple" style="animation-delay:2.9s"/><circle cx="327" cy="196" r="3.2" fill="#087EA4"/><text x="341" y="195" class="nodeLabel">EXECUTION</text><text x="341" y="207" class="nodeDetail">WARPS · CLUSTERS · UMMA</text></g>
    <g><circle cx="327" cy="238" r="8" fill="none" stroke="#8250DF" stroke-width="1" class="ripple" style="animation-delay:1.8s"/><circle cx="327" cy="238" r="8" fill="none" stroke="#8250DF" stroke-width="1" class="ripple" style="animation-delay:3.6s"/><circle cx="327" cy="238" r="3.2" fill="#8250DF"/><text x="341" y="237" class="nodeLabel">PERFORMANCE</text><text x="341" y="249" class="nodeDetail">OCCUPANCY · CARVEOUT</text></g>
    <g><rect x="313" y="256" width="92" height="22" rx="6" class="chipPanel"/><polygon points="0,-3.4 3.4,0 0,3.4 -3.4,0" transform="translate(324 267)" fill="#0969DA"/><text x="333" y="271" class="chipText">CUTLASS</text></g><g><rect x="413" y="256" width="62" height="22" rx="6" class="chipPanel"/><polygon points="0,-3.4 3.4,0 0,3.4 -3.4,0" transform="translate(424 267)" fill="#087EA4"/><text x="433" y="271" class="chipText">CUTE</text></g>
  </g>

  <g class="panelIn" style="animation-delay:.52s">
    <rect x="562" y="74" width="250" height="220" rx="14" class="panel"/><rect x="563" y="75" width="248" height="218" rx="13" fill="none" stroke="#087EA4" stroke-width="3" stroke-opacity=".15" pathLength="100" stroke-dasharray="14 86" stroke-dashoffset="100" class="edgeFlow" style="animation-delay:4.8s"/><rect x="563" y="75" width="248" height="218" rx="13" fill="none" stroke="#087EA4" stroke-width="1.1" stroke-opacity=".8" pathLength="100" stroke-dasharray="14 86" stroke-dashoffset="100" class="edgeFlow" style="animation-delay:4.8s"/><line x1="576" y1="75" x2="798" y2="75" class="topEdge"/><rect x="580" y="91" width="6" height="6" rx="1.5" fill="#8250DF"/><text x="594" y="98" class="section sans">SYSTEMS RESEARCH</text><text x="580" y="116" class="sectionMeta">MEASURED, END-TO-END WORK</text><line x1="580" y1="130" x2="794" y2="130" class="grid"/>
    <g><rect x="580" y="146" width="104" height="22" rx="6" class="chipPanel"/><polygon points="0,-3.4 3.4,0 0,3.4 -3.4,0" transform="translate(591 157)" fill="#0969DA"/><text x="600" y="161" class="chipText">LLM INFERENCE</text></g><g><rect x="692" y="146" width="62" height="22" rx="6" class="chipPanel"/><polygon points="0,-3.4 3.4,0 0,3.4 -3.4,0" transform="translate(703 157)" fill="#087EA4"/><text x="712" y="161" class="chipText">MLSYS</text></g>
    <line x1="594" y1="190" x2="594" y2="232" stroke="url(#tlGrad)" stroke-width="2" stroke-linecap="round" stroke-opacity=".65"/>
    <g><circle cx="594" cy="192" r="8" fill="none" stroke="#0969DA" stroke-width="1" class="ripple" style="animation-delay:0.7s"/><circle cx="594" cy="192" r="8" fill="none" stroke="#0969DA" stroke-width="1" class="ripple" style="animation-delay:2.5s"/><circle cx="594" cy="192" r="3.2" fill="#0969DA"/><text x="608" y="191" class="nodeLabel">PROFILE</text><text x="608" y="203" class="nodeDetail">NSIGHT COMPUTE + NSYS</text></g>
    <g><circle cx="594" cy="234" r="8" fill="none" stroke="#087EA4" stroke-width="1" class="ripple" style="animation-delay:1.5s"/><circle cx="594" cy="234" r="8" fill="none" stroke="#087EA4" stroke-width="1" class="ripple" style="animation-delay:3.3s"/><circle cx="594" cy="234" r="3.2" fill="#087EA4"/><text x="608" y="233" class="nodeLabel">RESEARCH</text><text x="608" y="245" class="nodeDetail">SYSTEMS + VISUAL COMPUTING</text></g>
    <rect x="580" y="254" width="3" height="14" rx="1.5" fill="#8250DF"/>
    <text x="591" y="264" class="sectionMeta">SLAM3R — DENSE RECONSTRUCTION</text>
  </g>

  <g class="panelIn" style="animation-delay:.66s">
    <line x1="28" y1="314" x2="812" y2="314" stroke="url(#footGrad)" stroke-width="1.5" stroke-linecap="round" stroke-opacity=".55"/>
    <text x="28" y="330" class="footText">SOURCE-DRIVEN STUDY · HARDWARE-AWARE DESIGN · REPRODUCIBLE MEASUREMENT</text>
    <text x="812" y="330" text-anchor="end" class="footText">JINCHENG HAN</text>
  </g>
</svg>