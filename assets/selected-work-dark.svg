<svg xmlns="http://www.w3.org/2000/svg" width="840" height="354" viewBox="0 0 840 354" role="img" aria-label="JinCheng Han selected work across LLM infrastructure, visual computing, and research workflows">
  <style>
    text{font-family:ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace;text-rendering:geometricPrecision}
    .title{font-size:20px;font-weight:700;fill:#EAF2FF}
    .eyebrow{font-size:10px;font-weight:700;fill:#A1B2C9}
    .project{font-size:13px;font-weight:700;fill:#EAF2FF}
    .projectMeta{font-size:8px;font-weight:700;fill:#7488A3}
    .flowLabel{font-size:8px;font-weight:700;fill:#A1B2C9}
    .stageText{font-size:7.5px;font-weight:700;fill:#EAF2FF}
    .footer{font-size:8px;font-weight:700;fill:#A1B2C9}
    .panel{fill:#151C27;stroke:#3B4F6A;stroke-width:1}
    .panelHighlight{fill:none;stroke:#58A6FF;stroke-opacity:.25;stroke-width:1;animation:panelBreathe 4.8s ease-in-out 1.35s infinite}
    .stagePanel{fill:#101722;stroke:#3B4F6A;stroke-width:1}
    .grid{stroke:#2D4058;stroke-width:1}
    .track{fill:#2A3C54}
    .intro,.panelIn{animation:fadeUp 560ms cubic-bezier(.22,1,.36,1) both}
    .breathRing{transform-box:fill-box;transform-origin:center;animation:nodeBreathe 4s ease-in-out 1.35s infinite}
    .meter{transform-box:fill-box;transform-origin:0% 50%;animation:growX 620ms cubic-bezier(.22,1,.36,1) .78s both,meterBreathe 3.8s ease-in-out 1.55s infinite}
    @keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
    @keyframes growX{from{transform:scaleX(0)}to{transform:scaleX(1)}}
    @keyframes panelBreathe{0%,100%{stroke-opacity:.18}50%{stroke-opacity:.72}}
    @keyframes nodeBreathe{0%,100%{opacity:.12;transform:scale(.72)}50%{opacity:.7;transform:scale(1.2)}}
    @keyframes meterBreathe{0%,100%{opacity:.58}50%{opacity:1}}
    @media(prefers-reduced-motion:reduce){*{animation:none!important}}
  </style>

  <g class="intro"><text x="24" y="32" class="title">SELECTED WORK</text><text x="24" y="53" class="eyebrow">SYSTEMS | VISION | RESEARCH TOOLS</text><text x="816" y="32" text-anchor="end" class="eyebrow">DESIGN - MEASURE - ITERATE</text></g>
  <g class="panelIn" style="animation-delay:0.38s"><rect x="24" y="77" width="792" height="68" rx="8" class="panel"/><rect x="25" y="78" width="790" height="66" rx="7" class="panelHighlight"/>
    <circle cx="52" cy="111" r="13" fill="none" stroke="#58A6FF" stroke-width="1" class="breathRing"/><circle cx="52" cy="111" r="5" fill="#58A6FF"/><circle cx="52" cy="111" r="9" fill="none" stroke="#7EE7F5" stroke-opacity=".55" stroke-width="1"/>
    <text x="72" y="106" class="project">nanoPD</text><text x="72" y="122" class="projectMeta">LLM INFRASTRUCTURE</text>
    <line x1="288" y1="91" x2="288" y2="131" class="grid"/>
    <text x="316" y="98" class="flowLabel">PREFILL / DECODE DISAGGREGATION</text><g class="stage"><rect x="316" y="109" width="58" height="20" rx="4" class="stagePanel"/><rect x="323" y="117" width="4" height="4" rx="2" fill="#58A6FF"/><text x="333" y="123" class="stageText">PREFILL</text></g><path d="M378 119h5l-3-3m3 3l-3 3" fill="none" stroke="#7488A3" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/><g class="stage"><rect x="388" y="109" width="66" height="20" rx="4" class="stagePanel"/><rect x="395" y="117" width="4" height="4" rx="2" fill="#7EE7F5"/><text x="405" y="123" class="stageText">TRANSFER</text></g><path d="M458 119h5l-3-3m3 3l-3 3" fill="none" stroke="#7488A3" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/><g class="stage"><rect x="468" y="109" width="58" height="20" rx="4" class="stagePanel"/><rect x="475" y="117" width="4" height="4" rx="2" fill="#58A6FF"/><text x="485" y="123" class="stageText">DECODE</text></g>
    <text x="588" y="106" class="projectMeta">FROM-SCRATCH INFERENCE ENGINE</text><rect x="588" y="119" width="188" height="4" rx="2" class="track"/><rect x="588" y="119" width="148" height="4" rx="2" fill="#7EE7F5" class="meter"/>
  </g><g class="panelIn" style="animation-delay:0.54s"><rect x="24" y="161" width="792" height="68" rx="8" class="panel"/><rect x="25" y="162" width="790" height="66" rx="7" class="panelHighlight"/>
    <circle cx="52" cy="195" r="13" fill="none" stroke="#58A6FF" stroke-width="1" class="breathRing"/><circle cx="52" cy="195" r="5" fill="#58A6FF"/><circle cx="52" cy="195" r="9" fill="none" stroke="#7EE7F5" stroke-opacity=".55" stroke-width="1"/>
    <text x="72" y="190" class="project">SLAM3R OnlineCam</text><text x="72" y="206" class="projectMeta">VISUAL COMPUTING</text>
    <line x1="288" y1="175" x2="288" y2="215" class="grid"/>
    <text x="316" y="182" class="flowLabel">ONLINE CAMERA TO DENSE 3D</text><g class="stage"><rect x="316" y="193" width="58" height="20" rx="4" class="stagePanel"/><rect x="323" y="201" width="4" height="4" rx="2" fill="#58A6FF"/><text x="333" y="207" class="stageText">STREAM</text></g><path d="M378 203h5l-3-3m3 3l-3 3" fill="none" stroke="#7488A3" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/><g class="stage"><rect x="388" y="193" width="55" height="20" rx="4" class="stagePanel"/><rect x="395" y="201" width="4" height="4" rx="2" fill="#7EE7F5"/><text x="405" y="207" class="stageText">TRACK</text></g><path d="M447 203h5l-3-3m3 3l-3 3" fill="none" stroke="#7488A3" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/><g class="stage"><rect x="457" y="193" width="59" height="20" rx="4" class="stagePanel"/><rect x="464" y="201" width="4" height="4" rx="2" fill="#58A6FF"/><text x="474" y="207" class="stageText">RECON</text></g>
    <text x="588" y="190" class="projectMeta">REAL-TIME RECONSTRUCTION</text><rect x="588" y="203" width="188" height="4" rx="2" class="track"/><rect x="588" y="203" width="124" height="4" rx="2" fill="#7EE7F5" class="meter"/>
  </g><g class="panelIn" style="animation-delay:0.70s"><rect x="24" y="245" width="792" height="68" rx="8" class="panel"/><rect x="25" y="246" width="790" height="66" rx="7" class="panelHighlight"/>
    <circle cx="52" cy="279" r="13" fill="none" stroke="#58A6FF" stroke-width="1" class="breathRing"/><circle cx="52" cy="279" r="5" fill="#58A6FF"/><circle cx="52" cy="279" r="9" fill="none" stroke="#7EE7F5" stroke-opacity=".55" stroke-width="1"/>
    <text x="72" y="274" class="project">paperwise</text><text x="72" y="290" class="projectMeta">RESEARCH WORKFLOW</text>
    <line x1="288" y1="259" x2="288" y2="299" class="grid"/>
    <text x="316" y="266" class="flowLabel">DEEP READING, RETRIEVAL, CONNECTIONS</text><g class="stage"><rect x="316" y="277" width="48" height="20" rx="4" class="stagePanel"/><rect x="323" y="285" width="4" height="4" rx="2" fill="#58A6FF"/><text x="333" y="291" class="stageText">READ</text></g><path d="M368 287h5l-3-3m3 3l-3 3" fill="none" stroke="#7488A3" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/><g class="stage"><rect x="378" y="277" width="68" height="20" rx="4" class="stagePanel"/><rect x="385" y="285" width="4" height="4" rx="2" fill="#7EE7F5"/><text x="395" y="291" class="stageText">RETRIEVE</text></g><path d="M450 287h5l-3-3m3 3l-3 3" fill="none" stroke="#7488A3" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/><g class="stage"><rect x="460" y="277" width="66" height="20" rx="4" class="stagePanel"/><rect x="467" y="285" width="4" height="4" rx="2" fill="#58A6FF"/><text x="477" y="291" class="stageText">CONNECT</text></g>
    <text x="588" y="274" class="projectMeta">LLM REPORTS / VECTOR KB / KG</text><rect x="588" y="287" width="188" height="4" rx="2" class="track"/><rect x="588" y="287" width="104" height="4" rx="2" fill="#7EE7F5" class="meter"/>
  </g>
  <line x1="24" y1="333" x2="816" y2="333" class="grid"/>
  <text x="24" y="350" class="footer">SYSTEMS DESIGN | REAL-TIME VISION | KNOWLEDGE WORKFLOWS</text><text x="816" y="350" text-anchor="end" class="footer">JINCHENG HAN</text>
