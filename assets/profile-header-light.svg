<svg xmlns="http://www.w3.org/2000/svg" width="840" height="126" viewBox="0 0 840 126" role="img" aria-label="JinCheng Han's GitHub profile header, Peking University undergraduate in Intelligent Science and Technology">
  <style>
    text{font-family:ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace;text-rendering:geometricPrecision}
    .sans{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif}
    .title{font-size:27px;font-weight:800;letter-spacing:.8px;fill:#1F2328}
    .eyebrow{font-size:8.5px;font-weight:600;letter-spacing:2.2px;fill:#818B98}
    .panelLabel{font-size:7.5px;font-weight:600;letter-spacing:1.8px;fill:#818B98}
    .panelValue{font-size:11px;font-weight:700;fill:#1F2328}
    .railText{font-size:8px;font-weight:600;letter-spacing:1.4px;fill:#59636E}
    .footText{font-size:8px;font-weight:600;letter-spacing:2px;fill:#818B98}
    .panel{fill:#FFFFFF;fill-opacity:.82;stroke:#D1D9E0;stroke-width:1}
    .topEdge{stroke:#B6C2CF;stroke-width:1;stroke-opacity:.55}
    .edgeFlow{animation:edgeRun 7s linear infinite}
    .intro,.panelIn{animation:fadeUp 560ms cubic-bezier(.22,1,.36,1) both}
    .ripple{transform-box:fill-box;transform-origin:center;opacity:0;animation:ripple 3.6s cubic-bezier(.25,.6,.35,1) infinite}
    .liveDot{transform-box:fill-box;transform-origin:center;animation:livePulse 2.6s ease-in-out infinite}
    .railPulse{animation:railRun 5.5s cubic-bezier(.45,0,.55,1) 1.8s infinite}
    @keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
    @keyframes ripple{0%{opacity:0;transform:scale(.5)}18%{opacity:.55}72%{opacity:0;transform:scale(1.5)}100%{opacity:0;transform:scale(1.5)}}
    @keyframes livePulse{0%,100%{opacity:.5}50%{opacity:1}}
    @keyframes edgeRun{to{stroke-dashoffset:0}}
    @keyframes railRun{0%{transform:translateX(0);opacity:0}10%{opacity:.95}88%{opacity:.95}100%{transform:translateX(768px);opacity:0}}
    @media(prefers-reduced-motion:reduce){*{animation:none!important}}
  </style>

  <defs>
    <linearGradient id="railGrad" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#0969DA"/><stop offset=".55" stop-color="#087EA4"/><stop offset="1" stop-color="#8250DF"/></linearGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#087EA4"/><stop offset="1" stop-color="#0969DA"/></linearGradient>
    <radialGradient id="panelGlow" cx=".5" cy=".5" r=".5"><stop stop-color="#087EA4" stop-opacity=".14"/><stop offset="1" stop-color="#087EA4" stop-opacity="0"/></radialGradient>
    <pattern id="dots" width="15" height="15" patternUnits="userSpaceOnUse"><circle cx="1.4" cy="1.4" r="1.1" fill="#D8DEE4"/></pattern>
  </defs>

  <rect x="618" y="4" width="198" height="46" fill="url(#dots)" opacity=".75"/>
  <circle cx="704" cy="44" r="86" fill="url(#panelGlow)"/>

  <g class="intro">
    <text x="28" y="27" class="eyebrow">PEKING UNIVERSITY — B.S. CANDIDATE · INTELLIGENT SCIENCE &amp; TECHNOLOGY</text>
    <text x="28" y="56" class="title sans">JINCHENG HAN</text>
    <rect x="29" y="64" width="74" height="3.5" rx="1.75" fill="url(#railGrad)"/>
  </g>

  <g class="panelIn" style="animation-delay:.28s">
    <rect x="592" y="16" width="224" height="58" rx="12" class="panel"/>
    <rect x="593" y="17" width="222" height="56" rx="11" fill="none" stroke="#087EA4" stroke-width="3" stroke-opacity=".16" pathLength="100" stroke-dasharray="16 84" stroke-dashoffset="100" class="edgeFlow"/>
    <rect x="593" y="17" width="222" height="56" rx="11" fill="none" stroke="#087EA4" stroke-width="1.1" stroke-opacity=".85" pathLength="100" stroke-dasharray="16 84" stroke-dashoffset="100" class="edgeFlow"/>
    <line x1="604" y1="17" x2="804" y2="17" class="topEdge"/>
    <rect x="592" y="30" width="3" height="32" rx="1.5" fill="url(#barGrad)"/>
    <text x="610" y="37" class="panelLabel">UNDERGRADUATE RESEARCH</text>
    <text x="610" y="57" class="panelValue">GPU SYSTEMS + MLSYS</text>
    <circle cx="799" cy="30" r="6.5" fill="none" stroke="#087EA4" stroke-width="1" class="ripple" style="animation-delay:.6s"/><circle cx="799" cy="30" r="6.5" fill="none" stroke="#087EA4" stroke-width="1" class="ripple" style="animation-delay:2.4s"/>
    <circle cx="799" cy="30" r="2.6" fill="#087EA4" class="liveDot"/>
  </g>

  <g class="panelIn" style="animation-delay:.48s">
    <line x1="28" y1="92" x2="812" y2="92" stroke="url(#railGrad)" stroke-width="2" stroke-linecap="round" stroke-opacity=".7"/>
    <g class="railPulse"><circle cx="44" cy="92" r="4" fill="#087EA4" opacity=".28"/><circle cx="44" cy="92" r="1.8" fill="#087EA4"/></g>
    <g><circle cx="36" cy="92" r="9" fill="none" stroke="#0969DA" stroke-width="1" class="ripple" style="animation-delay:0s"/><circle cx="36" cy="92" r="9" fill="none" stroke="#0969DA" stroke-width="1" class="ripple" style="animation-delay:1.8s"/><polygon points="0,-4.5 4.5,0 0,4.5 -4.5,0" transform="translate(36 92)" fill="#0969DA"/><text x="50" y="96" class="railText">GPU KERNELS</text></g><g><circle cx="250" cy="92" r="9" fill="none" stroke="#087EA4" stroke-width="1" class="ripple" style="animation-delay:0.9s"/><circle cx="250" cy="92" r="9" fill="none" stroke="#087EA4" stroke-width="1" class="ripple" style="animation-delay:2.7s"/><polygon points="0,-4.5 4.5,0 0,4.5 -4.5,0" transform="translate(250 92)" fill="#087EA4"/><text x="264" y="96" class="railText">CUDA ARCHITECTURE</text></g><g><circle cx="506" cy="92" r="9" fill="none" stroke="#0969DA" stroke-width="1" class="ripple" style="animation-delay:1.8s"/><circle cx="506" cy="92" r="9" fill="none" stroke="#0969DA" stroke-width="1" class="ripple" style="animation-delay:3.6s"/><polygon points="0,-4.5 4.5,0 0,4.5 -4.5,0" transform="translate(506 92)" fill="#0969DA"/><text x="520" y="96" class="railText">AI SYSTEMS</text></g><g><circle cx="676" cy="92" r="9" fill="none" stroke="#8250DF" stroke-width="1" class="ripple" style="animation-delay:2.7s"/><circle cx="676" cy="92" r="9" fill="none" stroke="#8250DF" stroke-width="1" class="ripple" style="animation-delay:4.5s"/><polygon points="0,-4.5 4.5,0 0,4.5 -4.5,0" transform="translate(676 92)" fill="#8250DF"/><text x="690" y="96" class="railText">VISUAL COMPUTING</text></g>
  </g>

  <g class="panelIn" style="animation-delay:.62s">
    <text x="28" y="117" class="footText">HARDWARE-AWARE SYSTEMS RESEARCH</text>
    <text x="812" y="117" text-anchor="end" class="footText">JINCHENG HAN</text>
  </g>
</svg>