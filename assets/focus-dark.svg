    <g class="focusNode"><circle cx="332" cy="229" r="12" fill="none" stroke="#58A6FF" stroke-width="1" class="breathRing"/><circle cx="332" cy="229" r="4" fill="#58A6FF"/><circle cx="332" cy="229" r="8" fill="none" stroke="#58A6FF" stroke-opacity=".35" stroke-width="1"/><text x="347" y="228" class="nodeLabel">PERFORMANCE</text><text x="347" y="240" class="nodeDetail">OCCUPANCY  |  CARVEOUT</text></g>
