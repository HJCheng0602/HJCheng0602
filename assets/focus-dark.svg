<svg xmlns="http://www.w3.org/2000/svg" width="840" height="326" viewBox="0 0 840 326" role="img" aria-label="JinCheng Han technical focus across GPU kernels, AI systems, and MLSys research">
  <style>
    text{font-family:ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace;text-rendering:geometricPrecision}
    .title{font-size:20px;font-weight:700;fill:#EAF2FF}
    .eyebrow{font-size:10px;font-weight:700;fill:#A1B2C9}
    .section{font-size:11px;font-weight:700;fill:#EAF2FF}
    .sectionMeta{font-size:8px;font-weight:700;fill:#7488A3}
    .chipText{font-size:8px;font-weight:700;fill:#EAF2FF}
    .nodeLabel{font-size:9px;font-weight:700;fill:#EAF2FF}
    .nodeDetail{font-size:7.5px;font-weight:700;fill:#A1B2C9}
    .footer{font-size:8px;font-weight:700;fill:#A1B2C9}
    .panel{fill:#151C27;stroke:#3B4F6A;stroke-width:1}
    .panelHighlight{fill:none;stroke:#58A6FF;stroke-opacity:.25;stroke-width:1;animation:panelBreathe 4.8s ease-in-out 1.35s infinite}
    .chipPanel{fill:#101722;stroke:#3B4F6A;stroke-width:1}
    .grid{stroke:#2D4058;stroke-width:1}
    .track{fill:#2A3C54}
    .intro,.panelIn{animation:fadeUp 560ms cubic-bezier(.22,1,.36,1) both}
    .breathRing{transform-box:fill-box;transform-origin:center;animation:nodeBreathe 4s ease-in-out 1.35s infinite}
    .signal{transform-box:fill-box;transform-origin:0% 50%;animation:signalFlow 3.8s ease-in-out 1.35s infinite}
    @keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes panelBreathe{0%,100%{stroke-opacity:.18}50%{stroke-opacity:.72}}
    @keyframes nodeBreathe{0%,100%{opacity:.12;transform:scale(.72)}50%{opacity:.7;transform:scale(1.2)}}
    @keyframes signalFlow{0%,100%{opacity:.5;transform:scaleX(.78)}50%{opacity:1;transform:scaleX(1)}}
    @media(prefers-reduced-motion:reduce){*{animation:none!important}}
  </style>

